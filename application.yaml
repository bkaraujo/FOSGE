engine:
  debug: true
  logger:
    level: TRACE

application:
  name: Brakeys
  version:
    major: 0
    minor: 1
    revision: 0
  window:
    title: Brakeys
    resolution: nHD
  graphics:
    vsync: true
  scenes:
    - name: FirstScene
      clearColor:
        red: 0.17
        green: 0.32
        blue: 0.17
        alpha: 1.0
      camera:
        left: -3.0
        right: 3.0
        bottom: -3.0
        top: 3.0
        near: -1.0
        far: 1.0
      layers:
        - name: world
          actors:
            - name: xxx
              components:
                - type: MeshComponent
                  properties:
                    - name: shader.source
                      value: assets/shader/basic
                    - name: geometry.mode
                      value: TRIANGLE
                    - name: geometry.type
                      value: UINT
                    - name: geometry.layout.in_position
                      value: FLOAT3
                    - name: geometry.layout.in_uv
                      value: FLOAT2
                    - name: geometry.elements
                      value: 0, 1, 3, 1, 2, 3
                    - name: geometry.vertices
                      value: 0.5, 0.5, 0.0, 1.0, 1.0, 0.5, -0.5, 0.0, 1.0, 0.0, -0.5, -0.5, 0.0, 0.0, 0.0, -0.5, 0.5, 0.0, 0.0, 1.0
                    - name: texture.asset
                      value: assets/texture/container.jpg
                - type: AudioSourceComponent
                  properties:
                    - name: path
                      value: assets/audio/clip/jump.wav
